<!DOCTYPE html>
<html>
  <head>
    <style>
      div {
        width: 100px;
        height: 100px;
        position: relative;
        background-color: red;

        animation-name: example;
        animation-duration: 4s;
        animation-iteration-count: infinite;
        animation-delay: -1s;
      }

      @keyframes example {
        /*//color red at left=0px to color yellow at left=200px
        //div.style.left */
        
        /* ขาไป (div ไหลไปทางขวามือ) */
        0% {
          background-color: red;
          left: 0px;
        }
        50% {
          background-color: yellow;
          left: 200px;
        }

        /* ขากลับ (div ไหลไปทางซ้ายมือ) */
        100% {
          background-color: red;
          left: 0px;
        }
      }
    </style>
  </head>
  <body>
    <div></div>
  </body>
</html>
