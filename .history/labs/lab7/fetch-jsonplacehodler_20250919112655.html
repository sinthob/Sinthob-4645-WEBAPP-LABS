<html>
  <h1>Adding a new post</h1>

  <div id="newPostShow"></div>

  <script>
    fetch(`https://jsonplaceholder.typicode.com/posts`, {
      method: "POST",
    })
      .then((response) => {
        return response.json();
      })
      .then((data) => {
        const githubName = data.login;
        const githubPic = data.avatar_url;
        const githubURL = data.html_url;

        document.getElementById("newPostShow").innerHTML = "";
      });
  </script>
</html>
